<!DOCTYPE html>
<html>
<head>
    <title>我的网页</title>
    <style>
        
        body {
           background: linear-gradient(135deg, #1c3768 0%, #5e90e5 100%);
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            color: #eee9e9;
            font-size: 40px;
            margin-bottom: 10px;
             text-shadow: 0 2px 4px rgba(0,0,0,0.3); 
        }
        p {
            color: #f0f0f5;
            font-size: 30px;
             text-shadow: 0 2px 4px rgba(0,0,0,0.3); 
        }
        .btn {
            background: #3108ea;
            color: rgb(255, 255, 255);
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 30px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #6e90ac;
            transform: scale(1.05);
        }
   .product-show {
    display: flex;           /* 开启横向排列 */
    justify-content: center; /* 整体居中 */
    gap: 20px;              /* 图片之间的间距 */
    margin: 30px 0;         /* 上下留白 */
    flex-wrap: wrap;        /* 如果屏幕太小，自动换行 */
}

.product-show {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 30px 0;
    flex-wrap: wrap;
}

.item {
    width: 30%;
    text-align: center;
    flex-shrink: 0;
}

.item img {
    width: 100%;
    border-radius: 8px;
    box-shadow: 0 4px 12px rgba(250, 251, 252, 0.15);
    transition: 0.3s;
     cursor: pointer
}

.item img:hover {
    transform: scale(1.05);
}

.item p {
    margin-top: 10px;
    color: #ffffff; 
     text-shadow: 0 2px 4px rgba(0,0,0,0.3); 
    font-size: 32px;
    font-weight: bold;
}
   </style>
</head>
<body>

<div class="product-show">
    <div class="item">
        <img src="photo.jpg" alt="产品图1" onclick="openLightbox(this.src)">
        <p>连续式石墨化炉</p>

    <div class="item">
        <img src="photo2.jpg" alt="产品图2" onclick="openLightbox(this.src)">
        <p>超高温设备</p>
    </div>
    <div class="item">
        <img src="photo3.jpg" alt="产品图3" onclick="openLightbox(this.src)">

    </div>
</div>
</div>
    <button class="btn" onclick="alert('联系方式：杜明辉 15050940507')">联系方式</button>
<!-- 图片放大灯箱 -->
<div id="lightbox" onclick="closeLightbox()" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; cursor:zoom-out;">
    <img id="lightbox-img" src="" style="max-width:90%; max-height:90%; border-radius:8px; box-shadow:0 0 30px rgba(0,0,0,0.5);">
</div>

<script>
function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').style.display = 'flex';
}

function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
}
</script>
</body>
</html>
